<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Envelope Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Space Grotesk", system-ui;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(244, 196, 107, 0.08), transparent 50%), #050508;
    }
    .stage {
      width: 520px;
      height: 420px;
      position: relative;
      perspective: 1800px;
    }
    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .flap {
      transform-origin: 260px 140px;
      animation: flapOpen 2s ease forwards;
    }
    .card {
      animation: cardSlide 2.2s ease forwards;
      animation-delay: 0.35s;
    }
    @keyframes flapOpen {
      0% { transform: rotateX(0deg); }
      40% { transform: rotateX(-20deg); }
      80% { transform: rotateX(-120deg); }
      100% { transform: rotateX(-120deg); }
    }
    @keyframes cardSlide {
      0% { transform: translateY(120px); opacity: 0; }
      50% { transform: translateY(10px); opacity: 1; }
      80% { transform: translateY(-15px); }
      100% { transform: translateY(-30px); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 520 420">
      <defs>
        <linearGradient id="bodyFill" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f7f1e8" />
          <stop offset="100%" stop-color="#f1d9b4" />
        </linearGradient>
        <linearGradient id="flapFill" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e2b585" />
          <stop offset="100%" stop-color="#c98a4f" />
        </linearGradient>
      </defs>

      <!-- body -->
      <g>
        <path d="M40 70 h440 a30 30 0 0 1 30 30 v220 a30 30 0 0 1 -30 30 H40 a30 30 0 0 1 -30 -30 V100 a30 30 0 0 1 30 -30 z" fill="url(#bodyFill)" />
        <path d="M40 210 L260 350 L480 210 V340 a30 30 0 0 1 -30 30 H70 a30 30 0 0 1 -30 -30z" fill="#f0d4ad" />
      </g>

      <!-- card -->
      <g class="card">
        <rect x="80" y="110" width="360" height="220" rx="22" fill="#fff9f4" stroke="#d9ab62" stroke-width="3" />
        <text x="110" y="170" font-family="'Playfair Display', serif" font-size="24" fill="#857066">Sei invitato</text>
        <text x="110" y="210" font-family="'Playfair Display', serif" font-size="32" fill="#2e1f1d">Annette & Tomaz</text>
        <text x="110" y="250" font-size="20" fill="#2e1f1d">29 novembre 2025</text>
      </g>

      <!-- flap -->
      <g class="flap">
        <path d="M40 100 L260 20 L480 100 V170 L260 280 L40 170z" fill="url(#flapFill)" stroke="#be8042" stroke-width="1" />
      </g>
    </svg>
  </div>
</body>
</html>
